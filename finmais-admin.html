<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <title>FinMais — Administração</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500&display=swap');
    :root {
      --gold: #A19276;
      --gold-dark: #8a7d65;
      --bg: #0f172a;
      --card: #1e2d40;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --border: #2d3f55;
      --success: #5a8a6a;
      --error: #c0392b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Jost', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    .header {
      background: #0a1120;
      padding: 20px 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-bottom: 1px solid var(--border);
    }
    .header img { height: 100px; width: auto; }

    .container { max-width: 700px; margin: 40px auto; padding: 0 20px; }

    h1 { font-size: 1.4rem; font-weight: 500; color: var(--gold); margin-bottom: 28px; text-align: center; letter-spacing: 0.05em; text-transform: uppercase; }

    .card {
      background: var(--card);
      border-radius: 16px;
      padding: 28px;
      border: 1px solid var(--border);
      margin-bottom: 24px;
    }

    .card h2 { font-size: 0.85rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.1em; color: var(--gold); margin-bottom: 18px; }

    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 0.78rem; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.08em; }
    .field input {
      width: 100%; padding: 10px 14px;
      background: #0f172a; border: 1px solid var(--border);
      border-radius: 8px; color: var(--text);
      font-family: 'Jost', sans-serif; font-size: 0.9rem; outline: none;
      transition: border-color 0.2s;
    }
    .field input:focus { border-color: var(--gold); }

    .btn {
      width: 100%; padding: 11px;
      background: var(--gold); color: #fff;
      border: none; border-radius: 999px;
      font-family: 'Jost', sans-serif; font-size: 0.9rem; font-weight: 500;
      cursor: pointer; transition: background 0.2s;
      margin-top: 4px;
    }
    .btn:hover { background: var(--gold-dark); }

    .resultado {
      margin-top: 16px; padding: 14px 16px;
      background: #0f172a; border-radius: 10px;
      border: 1px solid var(--border); display: none;
    }
    .resultado .link-gerado {
      font-size: 0.85rem; color: #7dd3a8;
      word-break: break-all; margin-bottom: 10px;
    }
    .resultado .expira { font-size: 0.78rem; color: var(--muted); }
    .copy-btn {
      margin-top: 10px; padding: 7px 16px;
      background: transparent; border: 1px solid var(--gold);
      color: var(--gold); border-radius: 999px;
      font-family: 'Jost', sans-serif; font-size: 0.8rem;
      cursor: pointer; transition: background 0.2s;
    }
    .copy-btn:hover { background: rgba(161,146,118,0.1); }

    .status-msg { font-size: 0.82rem; margin-top: 10px; }
    .status-msg.err { color: #f87171; }
    .status-msg.ok { color: #7dd3a8; }

    /* Tabela de links */
    .links-table { width: 100%; border-collapse: collapse; margin-top: 4px; }
    .links-table th {
      font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--muted); padding: 8px 10px; text-align: left;
      border-bottom: 1px solid var(--border);
    }
    .links-table td {
      font-size: 0.82rem; padding: 10px 10px;
      border-bottom: 1px solid rgba(45,63,85,0.5);
      color: var(--text);
    }
    .links-table tr:last-child td { border-bottom: none; }
    .badge {
      display: inline-block; padding: 2px 8px;
      border-radius: 999px; font-size: 0.7rem; font-weight: 500;
    }
    .badge.ativo { background: rgba(90,138,106,0.2); color: #7dd3a8; }
    .badge.expirado { background: rgba(192,57,43,0.2); color: #f87171; }

    #loading-links { font-size: 0.82rem; color: var(--muted); text-align: center; padding: 20px; }
  </style>
</head>

      statusEl.className = "status-msg err";
      return;
    }

    try {
      const res = await fetch(BACKEND + "/admin/gerar-link", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ adminPassword: pass, clienteNome: nome })
      });
      const data = await res.json();
      if (!data.success) throw new Error(data.error);

      document.getElementById("link-gerado").textContent = data.link;
      const expira = new Date(data.expiraEm).toLocaleDateString("pt-PT");
      document.getElementById("expira").textContent = "Expira em: " + expira;
      resultadoEl.style.display = "block";
      document.getElementById("cliente-nome").value = "";
    } catch (e) {
      statusEl.textContent = e.message || "Erro ao gerar link.";
      statusEl.className = "status-msg err";
    }
  }

  function copiarLink() {
    const link = document.getElementById("link-gerado").textContent;
    navigator.clipboard.writeText(link);
    const btn = document.querySelector(".copy-btn");
    btn.textContent = "Copiado ✓";
    setTimeout(() => btn.textContent = "Copiar link", 2000);
  }

  async function listarLinks() {
    const pass = document.getElementById("admin-pass").value.trim();
    const statusEl = document.getElementById("status-listar");
    const loadingEl = document.getElementById("loading-links");
    const tabelaEl = document.getElementById("tabela-links");

    if (!pass) {
      statusEl.textContent = "Introduza a password primeiro.";
      statusEl.className = "status-msg err";
      return;
    }

    statusEl.textContent = "";
    loadingEl.style.display = "block";
    tabelaEl.innerHTML = "";

    try {
      const res = await fetch(BACKEND + "/admin/listar-links?adminPassword=" + encodeURIComponent(pass));
      const data = await res.json();
      if (!data.success) throw new Error(data.error);

      loadingEl.style.display = "none";

      if (data.links.length === 0) {
        tabelaEl.innerHTML = "<p style=\"color:var(--muted);font-size:0.85rem;\">Ainda não foram gerados links.</p>";
        return;
      }

      const agora = new Date();
      let html = "<table class=\"links-table\"><thead><tr><th>Cliente</th><th>Criado em</th><th>Expira em</th><th>Estado</th></tr></thead><tbody>";
      for (const l of data.links) {
        const expira = new Date(l.expira_em);
        const ativo = agora < expira;
        const criado = new Date(l.criado_em).toLocaleDateString("pt-PT");
        const expiraStr = expira.toLocaleDateString("pt-PT");
        html += `<tr>
          <td>${l.cliente_nome}</td>
          <td>${criado}</td>
          <td>${expiraStr}</td>
          <td><span class="badge ${ativo ? 'ativo' : 'expirado'}">${ativo ? 'Ativo' : 'Expirado'}</span></td>
        </tr>`;
      }
      html += "</tbody></table>";
      tabelaEl.innerHTML = html;
    } catch (e) {
      loadingEl.style.display = "none";
      statusEl.textContent = e.message || "Erro ao carregar links.";
      statusEl.className = "status-msg err";
    }
  }
</script>
</body>
</html>
