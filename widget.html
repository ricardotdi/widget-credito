<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Simulador Crédito Habitação</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  padding: 20px;
  max-width: 480px;
  margin: auto;
}

h2 {
  margin-top: 30px;
}

input, button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 6px;
  border: 1px solid #ccc;
  font-size: 16px;
}

button {
  background: #0078ff;
  color: white;
  border: none;
  cursor: pointer;
}

button:hover {
  background: #005fcc;
}

.box {
  background: white;
  padding: 20px;
  border-radius: 10px;
  margin-top: 20px;
}

.result {
  font-size: 18px;
  margin-top: 10px;
  font-weight: bold;
}
</style>
</head>

<body>

<h1>Simulador de Crédito Habitação</h1>

<div class="box">
  <h2>Simulação indicativa</h2>

  <label>Valor do empréstimo (€)</label>
  <input id="valor" type="number" value="130000" />

  <label>Prazo (anos)</label>
  <input id="anos" type="number" value="32" />

  <label>Euribor (%)</label>
  <input id="euribor" type="number" value="0" />

  <label>Spread (%)</label>
  <input id="spread" type="number" value="1.4" />

  <button onclick="calcular()">Calcular prestação</button>

  <div id="resultado" class="result"></div>

  <button onclick="exportarExcel()">Exportar plano em Excel</button>
</div>

<div class="box">
  <h2>Quer ser contactado?</h2>

  <label>Nome</label>
  <input id="nome" type="text" />

  <label>Email</label>
  <input id="email" type="email" />

  <label>Telemóvel</label>
  <input id="telefone" type="text" />

  <button onclick="enviarLead()">Quero ser contactado</button>

  <div id="leadMsg" class="result"></div>
</div>

<script>
function calcular() {
  try {
    const valor = parseFloat(document.getElementById("valor").value);
    const anos = parseFloat(document.getElementById("anos").value);
    const euribor = parseFloat(document.getElementById("euribor").value);
    const spread = parseFloat(document.getElementById("spread").value);

    const meses = anos * 12;
    const taxaMensal = (euribor + spread) / 100 / 12;

    const prestacao =
      (valor * taxaMensal) / (1 - Math.pow(1 + taxaMensal, -meses));

    if (isNaN(prestacao)) {
      document.getElementById("resultado").innerHTML =
        "Ocorreu um erro ao calcular. Verifique os valores.";
      return;
    }

    document.getElementById("resultado").innerHTML =
      "Prestação mensal: " + prestacao.toFixed(2) + " €";
  } catch (e) {
    document.getElementById("resultado").innerHTML =
      "Ocorreu um erro ao calcular. Tente novamente.";
  }
}

function exportarExcel() {
  alert("Funcionalidade disponível na próxima versão.");
}

async function enviarLead() {
  const nome = document.getElementById("nome").value;
  const email = document.getElementById("email").value;
  const telefone = document.getElementById("telefone").value;

  if (!nome || !email || !telefone) {
    document.getElementById("leadMsg").innerHTML =
      "Preencha todos os campos.";
    return;
  }

  const payload = {
    nome,
    email,
    telefone,
    rendimento: "N/A",
    valorCredito: document.getElementById("valor").value,
    prazo: document.getElementById("anos").value,
    tipoTaxa: "Euribor + Spread"
  };

  try {
    const response = await fetch(
      "https://credito-backend-ffnk.onrender.com/send-email",
      {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      }
    );

    const result = await response.json();

    if (result.success) {
      document.getElementById("leadMsg").innerHTML =
        "Lead enviada com sucesso!";
    } else {
      document.getElementById("leadMsg").innerHTML =
        "Erro ao enviar a lead. Tente novamente.";
    }
  } catch (e) {
    document.getElementById("leadMsg").innerHTML =
      "Erro ao enviar a lead. Verifique a ligação.";
  }
}
</script>

</body>
</html>
